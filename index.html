<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Moon Project</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        body {
            background: radial-gradient(circle at top left, #1e1b4b, #0f172a);
            color: #ffffff;
            min-height: 100vh;
            display: flex;
            justify-content: center;
            align-items: center;
            padding: 20px;
        }
        .card {
            background: rgba(255, 255, 255, 0.05);
            backdrop-filter: blur(12px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            padding: 2rem;
            border-radius: 20px;
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.5);
            width: 100%;
            max-width: 600px;
            text-align: center;
        }
        h1 {
            font-size: 2rem;
            margin-bottom: 0.5rem;
            background: linear-gradient(90deg, #38bdf8, #818cf8);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        p {
            color: #94a3b8;
            margin-bottom: 1.5rem;
        }
        .form-group {
            margin-bottom: 1.2rem;
            text-align: left;
        }
        label {
            display: block;
            margin-bottom: 0.5rem;
            color: #cbd5e1;
            font-size: 0.85rem;
        }
        input[type="text"], input[type="file"] {
            width: 100%;
            padding: 0.8rem 1rem;
            background: rgba(15, 23, 42, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.15);
            border-radius: 10px;
            color: #fff;
            outline: none;
            transition: all 0.3s ease;
        }
        input[type="file"] {
            cursor: pointer;
        }
        button {
            width: 100%;
            padding: 0.8rem;
            border: none;
            border-radius: 10px;
            background: linear-gradient(90deg, #38bdf8, #6366f1);
            color: #fff;
            font-weight: bold;
            cursor: pointer;
            transition: transform 0.2s, box-shadow 0.2s;
            margin-top: 1rem;
        }
        button:hover {
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(56, 189, 248, 0.4);
        }
        
        #gallery-screen {
            display: none;
        }
        .user-greeting {
            font-size: 1.2rem;
            color: #38bdf8;
            margin-bottom: 1.5rem;
        }
        .image-container {
            display: flex;
            flex-direction: column;
            gap: 1.5rem;
            margin-top: 1rem;
        }
        .image-container img {
            width: 100%;
            border-radius: 15px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            box-shadow: 0 8px 20px rgba(0,0,0,0.4);
        }
        .upload-more {
            margin-top: 1.5rem;
            padding-top: 1.5rem;
            border-top: 1px solid rgba(255, 255, 255, 0.1);
        }
    </style>
</head>
<body>

    <!-- หน้าที่ 1: กรอกชื่อและเลือกรูปภาพ -->
    <div id="login-screen" class="card">
        <h1>Moon Project</h1>
        <p>กรุณาระบุชื่อและแนบรูปภาพของคุณ</p>
        <form id="userForm">
            <div class="form-group">
                <label>ชื่อ - นามสกุล</label>
                <input type="text" id="fullname" placeholder="ระบุชื่อ-นามสกุลของคุณ" required>
            </div>
            <div class="form-group">
                <label>เลือกรูปภาพของคุณ (เลือกได้หลายรูป)</label>
                <input type="file" id="imageInput" accept="image/*" multiple required>
            </div>
            <button type="submit">แสดงรูปภาพ</button>
        </form>
    </div>

    <!-- หน้าที่ 2: แสดงรูปภาพที่แนบเข้ามา -->
    <div id="gallery-screen" class="card">
        <h1>ยินดีต้อนรับ</h1>
        <div id="greeting" class="user-greeting"></div>
        <p>นี่คือรูปภาพที่คุณอัปโหลดไว้:</p>
        
        <div id="imageContainer" class="image-container"></div>

        <div class="upload-more">
            <button onclick="location.reload()">↺ เพิ่มรูปภาพใหม่ / เริ่มใหม่</button>
        </div>
    </div>

    <script>
        const userForm = document.getElementById('userForm');
        const loginScreen = document.getElementById('login-screen');
        const galleryScreen = document.getElementById('gallery-screen');
        const greeting = document.getElementById('greeting');
        const imageInput = document.getElementById('imageInput');
        const imageContainer = document.getElementById('imageContainer');

        userForm.addEventListener('submit', function(e) {
            e.preventDefault();
            const name = document.getElementById('fullname').value;
            const files = imageInput.files;

            if (files.length === 0) return;

            greeting.innerText = 'สวัสดีคุณ ' + name + ' 👋';
            imageContainer.innerHTML = ''; // ล้างค่าเดิม

            // ดึงรูปที่เลือกมาแสดงผล
            Array.from(files).forEach(file => {
                const reader = new FileReader();
                reader.onload = function(event) {
                    const img = document.createElement('img');
                    img.src = event.target.result;
                    imageContainer.appendChild(img);
                };
                reader.readAsDataURL(file);
            });

            // สลับหน้า
            loginScreen.style.display = 'none';
            galleryScreen.style.display = 'block';
        });
    </script>
</body>
</html>
